<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- En-têtes colonnes -->
  <rect x="60" y="30" width="220" height="30" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="51" text-anchor="middle" fill="#3C3489">Thread worker</text>

  <rect x="400" y="30" width="220" height="30" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="51" text-anchor="middle" fill="#085041">Thread main</text>

  <!-- Lignes de vie -->
  <line x1="170" y1="60" x2="170" y2="480" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="510" y1="60" x2="510" y2="480" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- worker: lock(mtx) -->
  <rect x="80" y="80" width="180" height="42" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="97" text-anchor="middle" fill="#3C3489">lock(mtx)</text>
  <text font-family="sans-serif" font-size="12" x="170" y="112" text-anchor="middle" fill="#534AB7">acquiert le mutex</text>

  <!-- worker: cv.wait() -->
  <rect x="80" y="148" width="180" height="56" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="168" text-anchor="middle" fill="#3C3489">cv.wait(lock, …)</text>
  <text font-family="sans-serif" font-size="12" x="170" y="184" text-anchor="middle" fill="#534AB7">relâche mtx</text>
  <text font-family="sans-serif" font-size="12" x="170" y="197" text-anchor="middle" fill="#534AB7">s'endort</text>

  <!-- worker en attente -->
  <line x1="170" y1="204" x2="170" y2="310" stroke="#AFA9EC" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text font-family="sans-serif" font-size="11" x="148" y="268" text-anchor="middle" fill="#888780" transform="rotate(-90,148,268)">en attente</text>

  <!-- main: sleep(1s) -->
  <rect x="420" y="80" width="180" height="42" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="97" text-anchor="middle" fill="#085041">sleep(1s)</text>
  <text font-family="sans-serif" font-size="12" x="510" y="112" text-anchor="middle" fill="#0F6E56">attend 1 seconde</text>

  <line x1="510" y1="122" x2="510" y2="200" stroke="#9FE1CB" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- main: lock_guard + readyToExit = true -->
  <rect x="420" y="200" width="180" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="220" text-anchor="middle" fill="#085041">lock_guard(mtx)</text>
  <text font-family="sans-serif" font-size="12" x="510" y="236" text-anchor="middle" fill="#0F6E56">readyToExit = true</text>
  <text font-family="sans-serif" font-size="12" x="510" y="249" text-anchor="middle" fill="#0F6E56">mutex relâché</text>

  <!-- main: notify_one() -->
  <rect x="420" y="272" width="180" height="42" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="289" text-anchor="middle" fill="#085041">cv.notify_one()</text>
  <text font-family="sans-serif" font-size="12" x="510" y="304" text-anchor="middle" fill="#0F6E56">signal envoyé</text>

  <!-- Flèche notify → worker -->
  <line x1="420" y1="293" x2="278" y2="320" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="348" y="296" text-anchor="middle" fill="#085041">réveille</text>

  <!-- worker: réacquiert + vérifie -->
  <rect x="80" y="310" width="180" height="56" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="330" text-anchor="middle" fill="#3C3489">réacquiert mtx</text>
  <text font-family="sans-serif" font-size="12" x="170" y="346" text-anchor="middle" fill="#534AB7">vérifie readyToExit</text>
  <text font-family="sans-serif" font-size="12" x="170" y="359" text-anchor="middle" fill="#534AB7">→ true</text>

  <!-- worker: affiche + termine -->
  <rect x="80" y="382" width="180" height="42" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="399" text-anchor="middle" fill="#3C3489">cout &lt;&lt; "Condition met."</text>
  <text font-family="sans-serif" font-size="12" x="170" y="414" text-anchor="middle" fill="#534AB7">thread termine</text>

  <!-- main: t.join() -->
  <rect x="420" y="330" width="180" height="42" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="347" text-anchor="middle" fill="#085041">t.join()</text>
  <text font-family="sans-serif" font-size="12" x="510" y="362" text-anchor="middle" fill="#0F6E56">attend fin du worker</text>

  <!-- Flèche join → worker -->
  <line x1="420" y1="351" x2="278" y2="403" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Fin -->
  <rect x="240" y="450" width="200" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="473" text-anchor="middle" fill="#444441">Programme terminé</text>

  <line x1="170" y1="424" x2="240" y2="465" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="372" x2="440" y2="458" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Légende -->
  <rect x="60" y="488" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="78" y="498" fill="#534AB7">mutex détenu</text>
  <rect x="190" y="488" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="208" y="498" fill="#0F6E56">mutex libre</text>
  <line x1="320" y1="494" x2="345" y2="494" stroke="#888780" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text font-family="sans-serif" font-size="12" x="352" y="498" fill="#5F5E5A">en attente</text>
</svg>
