header-includes:
  - \usepackage{microtype}
  - \usepackage{fancyhdr}
  - \pagestyle{fancy}
  - \fancyhf{}
  - \fancyhead[L]{\footnotesize\color[HTML]{374151}Programmation Concurrente}
  - \fancyhead[R]{\footnotesize\color[HTML]{6B7280}Tom Berthoud}
  - \fancyfoot[C]{\footnotesize\color[HTML]{6B7280}\thepage}
  - \renewcommand{\headrulewidth}{0pt}
  - \renewcommand{\footrulewidth}{0pt}
  - \setlength{\headheight}{14pt}
  - \setlength{\parindent}{0pt}
  - \setlength{\parskip}{0.45em}
  - \let\oldtableofcontents\tableofcontents
  - \renewcommand{\tableofcontents}{\oldtableofcontents\newpage}
  - \usepackage{titlesec}
  - \usepackage{tocloft}
  - \usepackage{ragged2e}
  - \AtBeginDocument{\RaggedRight}
  - \definecolor{heading}{HTML}{111827}
  - \definecolor{subtle}{HTML}{6B7280}
  - \titleformat{\section}{\Large\bfseries\color{heading}}{\thesection}{0.6em}{}
  - \titlespacing*{\section}{0pt}{1.2em}{0.5em}
  - \titleformat{\subsection}{\large\bfseries\color{heading}}{\thesubsection}{0.6em}{}
  - \titlespacing*{\subsection}{0pt}{1.0em}{0.35em}
  - \renewcommand{\cfttoctitlefont}{\LARGE\bfseries\color{heading}}
  - \renewcommand{\cftsecfont}{\color{heading}}
  - \renewcommand{\cftsecpagefont}{\color{heading}}
  - \renewcommand{\cftsubsecfont}{\color{subtle}}
  - \renewcommand{\cftsubsecpagefont}{\color{subtle}}
  - \setlength{\cftbeforesecskip}{4pt}
  # --- Code blocks stylisés (bulles arrondies) ---
  - \usepackage{tikz}
  - \usetikzlibrary{arrows.meta,calc,positioning}
  - \usepackage{tcolorbox}
  - \usepackage{booktabs}
  - \usepackage{xcolor}
  - \definecolor{codebg}{HTML}{F3F4F6}
  - \definecolor{codeborder}{HTML}{D1D5DB}
  - \definecolor{inlinebg}{HTML}{EEF2FF}
  # Redéfinir le bloc Shaded de pandoc avec tcolorbox
  - >
    \newtcolorbox{shadedbox}{
      colback=codebg,
      colframe=codeborder,
      boxrule=0.5pt,
      arc=6pt,
      left=8pt,
      right=8pt,
      top=6pt,
      bottom=6pt,
      fontupper=\small\ttfamily
    }
  - >
    \ifcsname Shaded\endcsname
    \renewenvironment{Shaded}{\begin{shadedbox}}{\end{shadedbox}}
    \else
    \newenvironment{Shaded}{\begin{shadedbox}}{\end{shadedbox}}
    \fi
  # Code inline avec fond gris
  - >
    \let\oldtexttt\texttt
    \renewcommand{\texttt}[1]{\colorbox{inlinebg}{\oldtexttt{#1}}}
include-before:
  - \newpage
